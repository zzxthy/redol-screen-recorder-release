name: Feature request
description: Suggest an improvement for Redol Screen Recorder.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What are you trying to accomplish?
      placeholder: "I want to..."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is difficult, slow, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Links, screenshots, or product examples are welcome.
